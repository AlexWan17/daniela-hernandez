<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniela Hernandez | Cartão de Visitas</title>
    <!-- Fontes de Luxo -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f7f9fc; /* Fundo claro para a página */
            color: #2b2d42; 
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- CARTÃO DE VISITAS VERSÃO MARCA D'ÁGUA ROSA --- */
        .premium-card {
            width: 100%;
            aspect-ratio: 1.586 / 1; /* Proporção exata de cartão físico */
            background: radial-gradient(circle at center, #ffffff 0%, #fff0f6 100%); /* Fundo off-white com o rosa da cliente nas bordas */
            border: 1px solid #ffcee7; 
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-shadow: 0 15px 35px rgba(255, 193, 227, 0.35), inset 0 1px 2px rgba(255, 255, 255, 1);
            overflow: hidden; /* Garante que a marca d'água não saia do cartão */
        }

        /* MARCA D'ÁGUA: Espadas em Rosa (#FFC1E3) gigantes por trás dos escritos */
        .card-watermark {
            position: absolute;
            width: 130%;
            height: 130%;
            top: -15%;
            left: -15%;
            opacity: 0.22; /* Sutil para não atrapalhar a leitura dos dados */
            pointer-events: none; /* Não interfere nos cliques */
            z-index: 1;
        }

        /* Garante que os blocos de texto fiquem por cima da marca d'água */
        .card-top-block, .card-footer-horizontal {
            position: relative;
            z-index: 2;
        }

        /* Bloco Superior: Logo (Espadas) + Nome + Cargo + Creci */
        .card-top-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Emblema central: Mantido 100% INTACTO nas cores originais */
        .swords-container {
            width: 70px;
            height: 70px;
            margin-bottom: 5px;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.05));
        }

        /* Nome em Vermelho Metalizado Intenso */
        .card-name {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff3b3b 0%, #8a0000 45%, #ff5252 55%, #5c0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.15));
            text-align: center;
            margin-bottom: 2px;
        }

        /* Cargo Elegante em Montserrat Escovado */
        .card-title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #4a3e43;
            margin-bottom: 2px;
        }

        /* Creci em tom grafite soft */
        .card-creci {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #5c5257;
            text-transform: uppercase;
        }

        /* Bloco de Dados Horizontal na Base do Cartão */
        .card-footer-horizontal {
            width: 100%;
            border-top: 1px solid #ffcee7; 
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #5c5257; 
        }

        .footer-item {
            text-align: center;
            flex: 1;
        }

        .footer-item.left { text-align: left; }
        .footer-item.center { text-align: center; }
        .footer-item.right { text-align: right; }

        /* Celular com a mesma cor e fonte (Cinzel) do nome em vermelho metalizado */
        .phone-highlight {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ff3b3b 0%, #8a0000 45%, #ff5252 55%, #5c0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0px 0.5px 1px rgba(0,0,0,0.1));
        }

        /* --- BOTÕES CTAs ABAIXO DO CARTÃO --- */
        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-link {
            background: #ffffff;
            border: 1px solid #e5d2dc;
            color: #4a3e43;
            box-shadow: 0 4px 10px rgba(255, 193, 227, 0.1);
        }

        .btn-link:hover {
            background: #fdf8fa;
            border-color: #FFC1E3; 
            color: #000000;
            transform: translateY(-2px);
        }

        .btn-save {
            background: #4a3e43; 
            color: #ffffff;
            border: none;
            box-shadow: 0 8px 20px rgba(74, 62, 67, 0.2);
            margin-top: 8px;
        }

        .btn-save:hover {
            background: #332a2e;
            transform: translateY(-2px);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
