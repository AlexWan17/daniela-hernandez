<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eac267"/>
            <stop offset="50%" stop-color="#bfa250"/>
            <stop offset="100%" stop-color="#8c7333"/>
        </linearGradient>
        <linearGradient id="ogumLinear" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#80cba0"/>
            <stop offset="50%" stop-color="#2c7247"/>
