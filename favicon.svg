        <path d="M 50,92 C 45,62 43,28 50,4 C 57,28 55,62 50,92 Z" fill="none" stroke="url(#ogumLinear)" stroke-width="1.75" stroke-linecap="round"/>
        <path d="M 47,72 L 53,70 M 46,58 L 54,55 M 46,44 L 54,40 M 47,30 L 53,26" fill="none" stroke="url(#ogumLinear)" stroke-width="1" stroke-opacity="0.7"/>
        <line x1="50" y1="92" x2="50" y2="4" stroke="url(#ogumLinear)" stroke-width="1" stroke-opacity="0.5"/>
    </g>
    
    <!-- Espada de Iansã (Dourado Original) -->
