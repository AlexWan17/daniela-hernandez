        <path d="M 50,92 C 45,62 43,28 50,4 C 57,28 55,62 50,92 Z" fill="none" stroke="url(#goldLinear)" stroke-width="1.75" stroke-linecap="round"/>
        <path d="M 48,80 C 46.5,58 45.5,35 50,12 C 54.5,35 53.5,58 52,80" fill="none" stroke="url(#goldLinear)" stroke-width="0.75" stroke-opacity="0.6"/>
